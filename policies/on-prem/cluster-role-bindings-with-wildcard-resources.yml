policies:
  - name: cluster-role-bindings-with-wildcard-resources
    comment: '000333242300'
    description: |
      ClusterRoleBinding references a ClusterRole that uses wildcard "*" which matches all items (5.1.3)
    resource: k8s.cluster-role-binding
    filters:
      - type: role-ref
        key: contains(keys(@),'rules') && rules!=`null` && 
             length(rules[?resources && (
             (resources != null && contains(resources, '*')) || 
             (verbs != null && contains(verbs, '*')) || 
             (api_groups != null && contains(api_groups, '*'))
             )])>`0`
        value: true