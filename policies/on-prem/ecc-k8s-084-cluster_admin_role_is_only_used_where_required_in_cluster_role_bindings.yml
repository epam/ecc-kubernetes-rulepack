policies:
  - name: ecc-k8s-084-cluster_admin_role_is_only_used_where_required_in_cluster_role_bindings
    comment: '000333242000'
    description: |
      cluster-admin role is not used only where required in cluster role bindings (5.1.1)
    resource: k8s.cluster-role-binding
    filters:
      - type: value
        key: role_ref.name
        op: eq
        value: cluster-admin
      - type: value
        key: role_ref.kind
        op: eq
        value: ClusterRole
      - type: value
        key: length(subjects[?!(kind=='Group' && name=='system:masters')])
        op: gt
        value: 0
