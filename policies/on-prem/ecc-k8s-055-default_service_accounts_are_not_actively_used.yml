policies:
  - name: ecc-k8s-055-default_service_accounts_are_not_actively_used
    comment: '000333242300'
    description: |
      Default service account is actively used (automountServiceAccountToken is not set to false) (5.1.5)
    resource: k8s.service-account
    filters:
      - type: value
        key: metadata.name
        op: eq
        value: default
      - type: value
        key: automount_service_account_token
        value: false
        op: ne
