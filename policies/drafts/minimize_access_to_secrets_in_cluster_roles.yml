policies:
  - name: ecc-k8s-087-minimize_access_to_secrets_in_cluster_roles
    comment: '000333242300'
    description: |
      Role has get, list or watch access to secret objects (5.1.2)
    resource: k8s.cluster-role-binding
    filters:
      - type: role-ref
        key: contains(keys(@),'rules') &&  rules!=`null` &&
          length(
          (rules[?contains(keys(@),'api_groups') && api_groups!=`null` && (contains(api_groups, '') || contains(api_groups, '*'))]) && 
          (
          (rules[?contains(keys(@),'resources') && resources!=`null` && contains(resources, 'secrets')]) &&
          (rules[?contains(keys(@),'verbs') && verbs!=`null` && (contains(verbs, 'get') || contains(verbs, 'list') || contains(verbs, 'watch') || contains(verbs, '*'))])
          ) ||
          (
          (rules[?contains(keys(@),'resources') && resources!=`null` && contains(resources, '*')])  && 
          (rules[?contains(keys(@),'verbs') && verbs!=`null` && (contains(verbs, '*') || contains(verbs, 'get') || contains(verbs, 'list') || contains(verbs, 'watch'))])
          )
          ) >`0`
        value: true