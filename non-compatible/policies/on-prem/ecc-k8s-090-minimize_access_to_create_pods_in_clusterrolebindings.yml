policies:
  - name: ecc-k8s-090-minimize_access_to_create_pods_in_clusterrolebindings
    comment: '000333242300'
    description: |
      ClusterRoleBinding references a ClusterRole that has create access to pod objects
    resource: k8s.cluster-role-binding
    filters:
      - type: role-ref
        key: |
          contains(keys(@),'rules') && rules!=`null` &&
          length(rules[?
            (contains(keys(@),'api_groups') && api_groups!=`null` && (contains(api_groups, '') || contains(api_groups, '*'))) &&
            (contains(keys(@),'resources') && resources!=`null` && (contains(resources, 'pods') || contains(resources, '*'))) &&
            (contains(keys(@),'verbs') && verbs!=`null` && (contains(verbs, 'create') || contains(verbs, '*')))
          ]) > `0`
        value: true
