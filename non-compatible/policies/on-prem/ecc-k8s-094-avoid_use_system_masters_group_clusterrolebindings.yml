policies:
  - name: ecc-k8s-094-avoid_use_system_masters_group_clusterrolebindings
    comment: '000118242000'
    description: |
      ClusterRoleBinding references the system:masters group
    resource: k8s.cluster-role-binding
    filters:
      - type: value
        key: |
          length(not_null(subjects, `[]`)[?(kind=='Group' &&
          name=='system:masters' &&
          api_group=='rbac.authorization.k8s.io')]) > `0` &&
          !(metadata.name=='cluster-admin' &&
          role_ref.kind=='ClusterRole' &&
          role_ref.name=='cluster-admin')
        value: true
