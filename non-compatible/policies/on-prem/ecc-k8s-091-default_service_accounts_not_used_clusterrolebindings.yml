policies:
  - name: ecc-k8s-091-default_service_accounts_not_used_clusterrolebindings
    comment: '000333242300'
    description: |
      Default service account has roles bound via ClusterRoleBinding
    resource: k8s.cluster-role-binding
    filters:
      - type: value
        key: |
          length(not_null(subjects, `[]`)[?(kind=='ServiceAccount' &&
          name=='default')])
        op: gt
        value: 0
