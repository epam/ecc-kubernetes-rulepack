policies:
  - name: ecc-k8s-055-default_service_accounts_are_not_actively_used
    comment: '000333242300'
    description: |
      Default service account has roles bound via RoleBinding
    resource: k8s.role-binding
    filters:
      - type: value
        key: length(subjects[?(kind=='ServiceAccount' && name=='default')])
        op: gt
        value: 0
