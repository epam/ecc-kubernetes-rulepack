policies:
  - name: ecc-k8s-093-avoid_use_system_masters_group_rolebindings
    comment: '000118242000'
    description: |
      RoleBinding references the system:masters group
    resource: k8s.role-binding
    filters:
      - type: value
        key: |
          length(subjects[?(kind=='Group' &&
          name=='system:masters' &&
          api_group=='rbac.authorization.k8s.io')])
        op: gt
        value: 0
