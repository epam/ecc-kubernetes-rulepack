policies:
  - name: ecc-k8s-083-cluster_admin_role_is_only_used_where_required_in_rolebindings
    comment: '000333242300'
    description: |
      cluster-admin ClusterRole is not used only where required in RoleBinding
    resource: k8s.role-binding
    filters:
      - type: value
        key: role_ref.name
        op: eq
        value: cluster-admin
